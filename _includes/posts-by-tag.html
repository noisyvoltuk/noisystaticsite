{% assign filtered = site.posts | where_exp: "post", "post.tags contains include.tag" %}

<div class="posts-widget">
  <h3>Posts tagged: {{ include.tag }}</h3>
  <ul>
    {% for post in filtered %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% else %}
      <li>No posts found.</li>
    {% endfor %}
  </ul>
</div>
