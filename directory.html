---
layout: default
title: Business Directory
description: Find local businesses in our community
permalink: /directory/
---

<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8502a;
    --accent-light: #f0e0d8;
    --muted: #7a7570;
    --border: #d8d0c4;
  }

  .dir-wrap {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
  }

  /* ── Hero ── */
  .dir-hero {
    background: var(--ink);
    color: var(--paper);
    padding: 72px 24px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .dir-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.03) 60px,
      rgba(255,255,255,0.03) 61px
    );
    pointer-events: none;
  }
  .dir-hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 400;
    letter-spacing: -0.01em;
    margin: 0 0 12px;
    line-height: 1.1;
  }
  .dir-hero h1 em {
    color: #e8a882;
    font-style: italic;
  }
  .dir-hero p {
    font-size: 1.05rem;
    color: #b0aaa0;
    margin: 0 auto 36px;
    max-width: 480px;
    font-weight: 300;
  }
  .dir-count {
    display: inline-block;
    background: rgba(200,80,42,0.25);
    color: #e8a882;
    border: 1px solid rgba(200,80,42,0.4);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── Search bar ── */
  .dir-search-wrap {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
  }
  .dir-search-wrap svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: #7a7570;
    pointer-events: none;
  }
  #dir-search {
    width: 100%;
    padding: 16px 20px 16px 48px;
    background: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    box-sizing: border-box;
  }
  #dir-search::placeholder { color: #aaa; }

  /* ── Controls ── */
  .dir-controls {
    max-width: 1100px;
    margin: 40px auto 0;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .dir-controls span {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .cat-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Grid ── */
  .dir-grid {
    max-width: 1100px;
    margin: 32px auto 80px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .dir-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1.05rem;
  }

  /* ── Card ── */
  .biz-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .biz-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .biz-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .biz-icon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .biz-cat-tag {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 9px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .biz-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin: 0 0 6px;
    line-height: 1.2;
  }
  .biz-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 16px;
    flex: 1;
  }
  .biz-meta {
    display: flex;
    flex-direction: column;
    gap: 5px;
    border-top: 1px solid var(--cream);
    padding-top: 14px;
    margin-top: auto;
  }
  .biz-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .biz-meta-row svg {
    width: 14px;
    height: 14px;
    stroke: var(--muted);
    flex-shrink: 0;
  }
  .biz-link-row {
    margin-top: 14px;
  }
  .biz-link-row a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.83rem;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: gap 0.15s;
  }
  .biz-link-row a:hover { gap: 10px; }

  /* ── Result count ── */
  #dir-result-count {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
</style>

<div class="dir-wrap">

  <!-- Hero -->
  <div class="dir-hero">
    <div class="dir-count" id="dir-badge">Loading…</div>
    <h1>Local Business<br><em>Directory</em></h1>
    <p>Discover and support businesses in our community.</p>
    <div class="dir-search-wrap">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="dir-search" placeholder="Search businesses, categories…" autocomplete="off">
    </div>
  </div>

  <!-- Category filters -->
  <div class="dir-controls">
    <span>Filter:</span>
    <button class="cat-btn active" data-cat="all">All</button>
    <!-- JS populates more buttons -->
  </div>

  <!-- Result count -->
  <div style="max-width:1100px;margin:20px auto 0;padding:0 24px;">
    <p id="dir-result-count"></p>
  </div>

  <!-- Grid -->
  <div class="dir-grid" id="dir-grid"></div>

</div>

const BUSINESSES = [

  },
  {

    description: "Modern gym with personal training, group classes, and nutrition coaching. Open 6am–10pm daily.",

  },
  {

  {

  },

  },
  {

    category: "Health & Wellness",
    emoji: "💆",
    description: "Sports massage, reflexology, and holistic therapies. Walk-ins welcome, appointments preferred.",
    address: "14 Spa Court",
    phone: "01234 567896",
    website: "https://example.com"
  },
  {
    name: "Harrington & Co Solicitors",
    category: "Professional",
    emoji: "⚖️",
    description: "Family-run legal firm handling conveyancing, wills, and business law for over 30 years.",
    address: "1 Crown Square",
    phone: "01234 567897",
    website: "https://example.com"
  },
  {
    name: "Spark Electricians",
    category: "Trades",
    emoji: "⚡",
    description: "NICEIC-registered electricians for domestic and commercial installations, rewires, and EV chargers.",
    address: "Based locally — call for visits",
    phone: "01234 567898",
    website: "https://example.com"
  }
];

// ── Render ──────────────────────────────────────────────────────────
const grid = document.getElementById('dir-grid');
const searchEl = document.getElementById('dir-search');
const badge = document.getElementById('dir-badge');
const countEl = document.getElementById('dir-result-count');
const controlsEl = document.querySelector('.dir-controls');

let activeCategory = 'all';
let searchQuery = '';

function getCategories() {
  return ['All', ...new Set(BUSINESSES.map(b => b.category))];
}

function buildCategoryButtons() {
  // Remove existing dynamic buttons
  controlsEl.querySelectorAll('.cat-btn:not([data-cat="all"])').forEach(b => b.remove());
  getCategories().slice(1).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => setCategory(cat));
    controlsEl.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCategory = cat.toLowerCase() === 'all' ? 'all' : cat;
  controlsEl.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active',
      (b.dataset.cat === 'all' && activeCategory === 'all') ||
      b.dataset.cat === activeCategory
    );
  });
  render();
}

function render() {
  const q = searchQuery.toLowerCase();
  const filtered = BUSINESSES.filter(b => {
    const matchesCat = activeCategory === 'all' || b.category === activeCategory;
    const matchesSearch = !q ||
      b.name.toLowerCase().includes(q) ||
      b.category.toLowerCase().includes(q) ||
      b.description.toLowerCase().includes(q);
    return matchesCat && matchesSearch;
  });

  badge.textContent = `${BUSINESSES.length} businesses listed`;
  countEl.textContent = filtered.length === BUSINESSES.length
    ? `Showing all ${filtered.length} businesses`
    : `Showing ${filtered.length} of ${BUSINESSES.length} businesses`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="dir-empty">No businesses found. Try a different search or filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map(b => `
    <div class="biz-card">
      <div class="biz-header">
        <div class="biz-icon">${b.emoji}</div>
        <span class="biz-cat-tag">${b.category}</span>
      </div>
      <div class="biz-name">${b.name}</div>
      <p class="biz-desc">${b.description}</p>
      <div class="biz-meta">
        ${b.address ? `<div class="biz-meta-row">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
          ${b.address}
        </div>` : ''}
        ${b.phone ? `<div class="biz-meta-row">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
          ${b.phone}
        </div>` : ''}
      </div>
      ${b.website ? `<div class="biz-link-row">
        <a href="${b.website}" target="_blank" rel="noopener">Visit website <svg style="width:13px;height:13px;stroke:currentColor;fill:none;" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg></a>
      </div>` : ''}
    </div>
  `).join('');
}

// Events
searchEl.addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

controlsEl.querySelector('[data-cat="all"]').addEventListener('click', () => setCategory('all'));

// Init
buildCategoryButtons();
render();
</script>
